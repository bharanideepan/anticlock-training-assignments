name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-app/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://crm:testpassword@localhost:5432/crm_test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: crm-test
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_FROM: test@crm.local

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run migrations
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  frontend-lint-test:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-app/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build
        env:
          VITE_API_URL: /api

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install e2e dependencies
        working-directory: crm-app/e2e
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: crm-app/e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Start application stack
        working-directory: crm-app
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --build --wait --wait-timeout 180

      - name: Run e2e tests
        working-directory: crm-app/e2e
        env:
          BASE_URL: http://localhost:8080
          API_URL: http://localhost:3000
          E2E_ADMIN_EMAIL: admin@crm.local
          E2E_ADMIN_PASSWORD: Admin@123
          E2E_READONLY_EMAIL: readonly@crm.local
        run: pnpm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            crm-app/e2e/playwright-report/
            crm-app/e2e/test-results/

      - name: Tear down stack
        if: always()
        working-directory: crm-app
        run: docker compose -f docker-compose.yml down -v

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t crm-backend:${{ github.sha }} --file ./crm-app/backend/Dockerfile ./crm-app

      - name: Build frontend image
        run: docker build -t crm-frontend:${{ github.sha }} --build-arg VITE_API_URL=/api --file ./crm-app/frontend/Dockerfile ./crm-app
